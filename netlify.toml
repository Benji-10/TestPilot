[build]
  command = "npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[dev]
  command = "cd frontend && npm run dev"
  port = 8888
  targetPort = 5173
  framework = "#custom"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdf-parse", "mammoth"]

# API routes
[[redirects]]
  from = "/api/auth/sync"
  to = "/.netlify/functions/auth-sync"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/sessions/:sessionId/files/:fileId"
  to = "/.netlify/functions/files"
  status = 200

[[redirects]]
  from = "/api/sessions/:sessionId/files"
  to = "/.netlify/functions/sessions"
  status = 200

[[redirects]]
  from = "/api/sessions/:sessionId/exams"
  to = "/.netlify/functions/sessions"
  status = 200

[[redirects]]
  from = "/api/sessions/:sessionId/analytics"
  to = "/.netlify/functions/sessions"
  status = 200

[[redirects]]
  from = "/api/sessions/:sessionId/duplicate"
  to = "/.netlify/functions/sessions"
  status = 200

[[redirects]]
  from = "/api/sessions/:sessionId"
  to = "/.netlify/functions/sessions"
  status = 200

[[redirects]]
  from = "/api/sessions"
  to = "/.netlify/functions/sessions"
  status = 200

[[redirects]]
  from = "/api/exams/generate"
  to = "/.netlify/functions/exams-generate"
  status = 200

[[redirects]]
  from = "/api/exams/:examId/attempts"
  to = "/.netlify/functions/attempts"
  status = 200

[[redirects]]
  from = "/api/attempts/:attemptId/submit"
  to = "/.netlify/functions/attempts"
  status = 200

[[redirects]]
  from = "/api/attempts/:attemptId/mark"
  to = "/.netlify/functions/attempts"
  status = 200

[[redirects]]
  from = "/api/attempts/:attemptId"
  to = "/.netlify/functions/attempts"
  status = 200

[[redirects]]
  from = "/api/analytics"
  to = "/.netlify/functions/analytics"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
