[build]
  command = "npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[dev]
  command = "cd frontend && npm run dev"
  port = 8888
  targetPort = 5173
  framework = "#custom"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdf-parse", "mammoth"]

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
